spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ys_tb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: 
    timeout: 3000ms
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.qq.com
    port: 465
    username: 811570083@qq.com
    password: your_email_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  security:
    user:
      name: admin
      password: admin123
    always-use-default-target-url: true
    default-target-url: /admin
    login-page: /admin/login
    failure-url: /admin/login?error=true
    logout:
      logout-url: /admin/logout
      logout-success-url: /admin/login
  thymeleaf:
    cache: false
  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: status
        logic-delete-value: 1
        logic-not-delete-value: 0
    mapper-locations: classpath:mapper/*.xml

server:
  port: 8080

seckill:
  orderTimeOut: 30
normal:
  orderTimeOut: 7
shoppinCar:
  timeOut: 30

logging:
  level:
    org.ys.transaction: debug
    org.ys.commens: debug
  file:
    name: logs/transaction.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"