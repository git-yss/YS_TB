spring:
  application:
    name: ys-tb
  datasource:
    url: jdbc:mysql://localhost:3306/ys_tb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    database-name: ys_tb
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 3000ms
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    packages:
      trust-all: false
      trusted: org.ys.commens.vo,java.math,java.lang,java.util
    pool:
      enabled: true
      max-connections: 50
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.qq.com
    port: 465
    username: 811570083@qq.com
    password: your_email_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  security:
    user:
      name: admin
      password: admin123
    always-use-default-target-url: true
    default-target-url: /admin
    login-page: /admin/login
    failure-url: /admin/login?error=true
    logout:
      logout-url: /admin/logout
      logout-success-url: /admin/login
  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: true
    default-property-inclusion: non_null
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3.5:9b

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.ys.transaction.Infrastructure.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      update-strategy: IGNORED
      logic-delete-field: status
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

redis:
  mode: single
  address: redis://127.0.0.1:6379
  password:
  timeout: 3000
  database: 0
  pool:
    max-active: 64
    max-idle: 24
    min-idle: 8
    max-wait: 3000

seckill:
  orderTimeOut: 30
normal:
  orderTimeOut: 7
shoppinCar:
  timeOut: 30

logging:
  level:
    org.ys.transaction: debug
    org.ys.commens: debug
    org.ys.commens.dao: debug
    com.baomidou.mybatisplus: debug
    org.mybatis: debug
  file:
    name: logs/transaction.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

app:
  es:
    host: localhost
    port: 9200
    scheme: http
    # 别名：对外暴露给查询/写入；物理索引：通过 goods-index-prefix 版本化创建
    goods-index-alias: ys_goods_alias
    goods-index-prefix: ys_goods_index_v
  ollama:
    enabled: true
    parse-timeout-ms: 80000
  canal:
    enabled: false
    host: 127.0.0.1
    port: 11111
    destination: example
    username:
    password:
    batch-size: 200
    poll-interval-ms: 1000
    schema: ys_tb
    goods-table: ys_goods
  assistant:
    memory-ttl-hours: 24
