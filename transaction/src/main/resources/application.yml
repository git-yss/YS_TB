spring:
  application:
    name: ys-tb
  datasource:
    url: jdbc:mysql://localhost:3306/ys_tb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    database-name: ys_tb
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 3000ms
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    packages:
      trust-all: false
      trusted: org.ys.commens.vo,java.math,java.lang,java.util
    pool:
      enabled: true
      max-connections: 50
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.qq.com
    port: 465
    username: 811570083@qq.com
    password: your_email_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  security:
    user:
      name: admin
      password: admin123
    always-use-default-target-url: true
    default-target-url: /admin
    login-page: /admin/login
    failure-url: /admin/login?error=true
    logout:
      logout-url: /admin/logout
      logout-success-url: /admin/login
  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: true
    default-property-inclusion: non_null
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
#          model: qwen3.5:9b-q4_K_M
          model: qwen2.5:3b

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.ys.transaction.Infrastructure.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      update-strategy: IGNORED
      logic-delete-field: status
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

redis:
  mode: single
  address: redis://127.0.0.1:6379
  password:
  timeout: 3000
  database: 0
  pool:
    max-active: 64
    max-idle: 24
    min-idle: 8
    max-wait: 3000

seckill:
  orderTimeOut: 30
normal:
  orderTimeOut: 7
shoppinCar:
  timeOut: 30

logging:
  level:
    root: info
    org.ys.transaction: info
    com.baomidou.mybatisplus: debug
    org.mybatis: debug
  file:
    name: logs/transaction.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

app:
  pay:
    alipay:
      app-id: 9021000162675993
      merchant-private-key: 
      alipay-public-key: 
      gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
      notify-url: http://localhost:8080/user/recharge/alipay/notify
      return-url: http://localhost:5173/user
      sign-type: RSA2
      charset: UTF-8
    wechat:
      app-id: your_wechat_app_id
      mch-id: your_wechat_merchant_id
      private-key-path: D:/cert/apiclient_key.pem
      merchant-serial-number: your_wechat_serial_no
      api-v3-key: your_wechat_api_v3_key
      notify-url: http://localhost:8080/user/recharge/wechat/notify
  es:
    host: localhost
    port: 9200
    scheme: http
    # 别名：对外暴露给查询/写入；物理索引：通过 goods-index-prefix 版本化创建
    goods-index-alias: ys_goods_alias
    goods-index-prefix: ys_goods_index_v
  ollama:
    enabled: true
    # 自然语言解析：超时后放弃 AI 条件，仅按用户表单条件搜索（总耗时可控在约 15s 内）
    parse-timeout-ms: 12000
    # 可选，专用于解析的小模型（需 ollama pull），例如 qwen2.5:3b；不填则用 spring.ai.ollama.chat.options.model
    # parser-model: qwen2.5:3b
    parser-num-predict: 256
    parser-num-ctx: 2048
    parser-temperature: 0.1
    parser-json-format: true
  canal:
    enabled: false
    host: 127.0.0.1
    port: 11111
    destination: example
    username:
    password:
    batch-size: 200
    poll-interval-ms: 1000
    schema: ys_tb
    goods-table: ys_goods
  assistant:
    memory-ttl-hours: 24
    # Redis 中每会话最多保留的历史行数（每行 U: 或 A: 各算一行；100 行约 50 轮完整问答）
    max-history-lines: 100
    # 拼进大模型 user 提示里的「历史」总字符上限（从最近一轮往前装，装不下则丢弃更早的，控制 prefill 与延迟）
    max-history-prompt-chars: 12000
    # 写入历史的助手回复最长字符（避免超长 JSON reply 撑爆上下文）
    max-reply-chars-in-history: 800
  rag:
    enabled: true
    # 与 spring.ai.ollama.base-url 一致即可；嵌入模型需单独 ollama pull
    ollama-base-url: http://localhost:11434
    embedding-model: nomic-embed-text
    chunk-max-chars: 900
    chunk-overlap-chars: 120
    retrieve-max-results: 6
    retrieve-min-score: 0.55
    ingest-max-chars: 200000
    http-timeout-seconds: 60
    embed-timeout-seconds: 90
    # memory=进程内向量；多实例生产请扩展 LangChain4jRagConfiguration 接入共享向量库
    store-type: memory

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
